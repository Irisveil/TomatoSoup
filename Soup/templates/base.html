{% load static %}

<!DOCTYPE HTML> 
<html lang="en">
    <head> 
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'css/global.css' %}">
        {% block head %}{% endblock %}
    </head> 

    <body>

        <!-- Top Bar -->
        <header class="topbar">
            <section class="topbar-left">
                <a href="#" class="topbar-logo">
                    <img
                        src="{% static 'icons/tomatosoup-icon.svg' %}"
                        alt="Tomato Soup logo">
                    <span class="topbar-title">TomatoSoup</span>
                </a>
            </section>

            <nav class="topbar-right" aria-label="Primary">
                <a href="{% url 'home' %}" class="topbar-link {% if request.resolver_match.url_name == 'home' %}topbar-link--active{% endif %}">
                    <span class="topbar-link-icon" aria-hidden="true">
                        <img src="{% static 'icons/Icon Left_home.svg' %}" alt="" />
                    </span>
                    <span class="topbar-link-label">Home</span>
                </a>
                <a href="{% url 'profile' %}" class="topbar-link {% if request.resolver_match.url_name == 'profile' %}topbar-link--active{% endif %}">
                    <span class="topbar-link-icon" aria-hidden="true">
                        <img src="{% static 'icons/Icon Left_profile.svg' %}" alt="" />
                    </span>
                    <span class="topbar-link-label">Profile</span>
                </a>
                <a href="{% url 'login' %}" class="topbar-link {% if request.resolver_match.url_name == 'login' %}topbar-link--active{% endif %}">
                    <span class="topbar-link-icon" aria-hidden="true">
                        <img src="{% static 'icons/Icon Left_signin.svg' %}" alt="" />
                    </span>
                    <span class="topbar-link-label">Sign In</span>
                </a>
            </nav>
        </header>

        <!-- Child templates will over ride to display page content-->
        <main class="page-content">{% block content %}{% endblock %}</main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-left">
                <span>&copy; 2019 Cult. of Soup</span>
            </div>
            <nav class="footer-links" aria-label="Footer">
                <a href="#" class="footer-link">Privacy Policy</a>
                <a href="#" class="footer-link">Terms &amp; Conditions</a>
                <a href="#" class="footer-link">Cookie Policy</a>
                <a href="#" class="footer-link">Contact</a>
            </nav>
        </footer>

            //         localStorage.setItem("theme", next);

            // });
        </script>

    </body>
</html>
